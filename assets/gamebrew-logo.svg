<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gamebrew logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="brew" x1="80" y1="150" x2="176" y2="204" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- app-icon tile -->
  <rect width="256" height="256" rx="60" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="253" height="253" rx="58.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="3"/>

  <!-- brewed liquid (fills the lower flask body) -->
  <path d="M91 150 L165 150 L182 190 A14 14 0 0 1 168 204 L88 204 A14 14 0 0 1 74 190 Z" fill="url(#brew)"/>

  <!-- play triangle rising in the brew -->
  <path d="M114 162 L114 194 L150 178 Z" fill="#FFFFFF"/>

  <!-- rising bubbles -->
  <circle cx="118" cy="136" r="6.5" fill="#FFFFFF" fill-opacity="0.9"/>
  <circle cx="137" cy="121" r="4.5" fill="#FFFFFF" fill-opacity="0.75"/>

  <!-- flask body outline -->
  <path d="M108 66 L108 112 L74 190 A14 14 0 0 0 88 204 L168 204 A14 14 0 0 0 182 190 L148 112 L148 66"
        fill="none" stroke="#FFFFFF" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- flask mouth / lip -->
  <path d="M100 66 L156 66" stroke="#FFFFFF" stroke-width="11" stroke-linecap="round"/>
</svg>
